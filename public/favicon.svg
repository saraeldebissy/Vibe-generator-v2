<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- CRT monitor body -->
  <rect x="2" y="4" width="28" height="20" rx="3" ry="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Screen bezel -->
  <rect x="4" y="6" width="24" height="16" rx="2" ry="2" fill="#0d0d0d"/>
  <!-- Glowing screen -->
  <rect x="5" y="7" width="22" height="14" rx="1" ry="1" fill="#001a00"/>
  <!-- Screen glow/content — cursor blink -->
  <rect x="8" y="11" width="8" height="2" rx="1" fill="#00ff41" opacity="0.9"/>
  <rect x="8" y="15" width="12" height="2" rx="1" fill="#00ff41" opacity="0.6"/>
  <rect x="17" y="11" width="2" height="2" rx="0.5" fill="#00ff41"/>
  <!-- Monitor stand neck -->
  <rect x="14" y="24" width="4" height="3" fill="#1a1a1a"/>
  <!-- Monitor base -->
  <rect x="10" y="27" width="12" height="2" rx="1" fill="#222"/>
</svg>
